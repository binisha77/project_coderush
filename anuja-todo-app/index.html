<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo app</title>
    <style>

    </style>
</head>

<body>
    <input id="task">
    <button onclick="addTask()"></button>
    <ul id="list"></ul>

    <script>
        function addTask() {
            const li = document.createElement("li");
            li.textContent = task.value;
            li.onclick = () => li.remove();
            list.appendChild(li);
        }
    </script>
</body>

</html>
